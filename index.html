    color: #94a3b8;
}

.hidden {
    display: none;
}

.loader {
    margin-top: 20px;
}

.bar {
    height: 6px;
    width: 0%;
    background: #38bdf8;
    border-radius: 5px;
    animation: load 3s forwards;
}

@keyframes load {
    0% { width: 0%; }
    100% { width: 100%; }
}
</style>
